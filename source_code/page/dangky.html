<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar (Shared Component) -->
<header class="bg-surface border-b border-outline-variant shadow-sm sticky top-0 z-50">
<div class="flex justify-between items-center h-16 px-lg max-w-container-max mx-auto w-full">
<div class="flex items-center gap-xl">
<a class="text-headline-md font-bold text-primary" href="#">ScholarTrend</a>

</nav>

</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center py-section px-md relative overflow-hidden">
<!-- Subtle Ambient Background Decorations -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-40">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-secondary-container rounded-full blur-[100px]"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-tertiary-fixed rounded-full blur-[100px]"></div>
</div>
<!-- Registration Card Container -->
<div class="w-full max-w-[480px] z-10">
<div class="bg-surface-container-lowest border border-outline-variant shadow-sm rounded-xl overflow-hidden p-xl">
<!-- Card Header -->
<div class="text-center mb-xl"><h1 class="text-display-md font-headline-md text-primary mb-2">Tạo tài khoản ScholarTrend</h1><p class="text-body-md text-on-surface-variant">Tham gia cộng đồng nghiên cứu và khám phá xu hướng khoa học toàn cầu.</p></div>
<!-- Registration Form -->
<form class="space-y-md" id="registrationForm">
<!-- Status Messages (Hidden by default) -->
<div class="hidden bg-tertiary-fixed text-on-tertiary-fixed-variant p-md rounded-lg flex items-center gap-sm mb-md border border-on-tertiary-container/20" id="successMessage"><span class="material-symbols-outlined">check_circle</span><p class="text-label-md">Chúng tôi đã gửi mã xác minh đến email của bạn.</p></div>
<div class="hidden bg-error-container text-on-error-container p-md rounded-lg flex items-center gap-sm mb-md border border-error/20" id="errorMessage">
<span class="material-symbols-outlined">error</span>
<p class="text-label-md">Vui lòng điền đầy đủ các thông tin bắt buộc.</p>
</div>
<!-- Input Fields -->
<div class="space-y-base">
<label class="text-label-md font-bold text-on-surface-variant block px-1">Họ và tên</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">badge</span>
<input
    id="fullName"
    name="fullName"
    class="w-full pl-11 pr-md py-3 bg-surface-container-low border border-outline-variant rounded-xl text-body-md form-input-focus placeholder:text-outline transition-all"
    type="text"
    placeholder="Nguyễn Văn A"
    pattern="^[A-Za-zÀ-ỹà-ỹ]+(\s+[A-Za-zÀ-ỹà-ỹ]+)+$"
    title="Vui lòng nhập đầy đủ họ và tên (ít nhất 2 từ)."
    required>
</div>
</div>
<div class="space-y-base">
<label class="text-label-md font-bold text-on-surface-variant block px-1">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">mail</span>
<input
    id="email"
    name="email"
    class="w-full pl-11 pr-md py-3 bg-surface-container-low border border-outline-variant rounded-xl text-body-md form-input-focus placeholder:text-outline transition-all"
    type="email"
    placeholder="example@email.com"
    required>
</div>
</div>
<div class="space-y-base">
<label class="text-label-md font-bold text-on-surface-variant block px-1">Tên đăng nhập</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">person</span>
<input
    id="username"
    name="username"
    class="w-full pl-11 pr-md py-3 bg-surface-container-low border border-outline-variant rounded-xl text-body-md form-input-focus placeholder:text-outline transition-all"
    type="text"
    placeholder="Username"
    pattern="^[A-Za-z0-9_]{4,20}$"
    title="Tên đăng nhập từ 4 đến 20 ký tự, chỉ gồm chữ, số và dấu gạch dưới (_)."
    required>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-base">

<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">lock</span>
<input
    id="password"
    name="password"
    class="w-full pl-11 pr-md py-3 bg-surface-container-low border border-outline-variant rounded-xl text-body-md form-input-focus placeholder:text-outline transition-all"
    type="password"
    placeholder="Password"
    pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$"
    title="Mật khẩu phải có ít nhất 8 ký tự, bao gồm ít nhất 1 chữ và 1 số."

</div>

    onclick="handleRegister(event)"

    Đăng ký
</button>
<div class="text-center pt-md border-t border-outline-variant mt-xl">
<p class="text-label-md text-on-surface-variant">
                            Đã có tài khoản?

</p>

<div class="mt-xl text-center">

</div>

<!-- Footer (Shared Component) -->

<script>
async function handleRegister(event) {

    event.preventDefault();

    const errorMsg = document.getElementById("errorMessage");
    const successMsg = document.getElementById("successMessage");

    errorMsg.classList.add("hidden");
    successMsg.classList.add("hidden");

    const fullName = document.getElementById("fullName").value.trim();
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {

        const response = await fetch("../api/dangky.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                fullName: fullName,
                username: username,
                email: email,
                password: password
            })
        });

        const result = await response.json();

        if (result.success) {

            successMsg.innerHTML = result.message;
            successMsg.classList.remove("hidden");

            document.getElementById("registrationForm").reset();

            // Chuyển sang trang đăng nhập sau 2 giây
            setTimeout(() => {
                window.location.href = "dangnhap.html";
            }, 2000);

        } else {

            errorMsg.innerHTML = result.message;
            errorMsg.classList.remove("hidden");

        }

    } catch (error) {

        errorMsg.innerHTML = "Không thể kết nối đến máy chủ.";
        errorMsg.classList.remove("hidden");

        console.error(error);

    }

}
</script>
