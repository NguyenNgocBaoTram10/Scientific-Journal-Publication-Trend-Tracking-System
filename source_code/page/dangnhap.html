<script>
async function handleLogin(event) {

    if (event) event.preventDefault();

    const errorBox = document.getElementById("errorMessage");
    const successBox = document.getElementById("successMessage");

    errorBox.classList.add("hidden");
    successBox.classList.add("hidden");

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if (username === "" || password === "") {
        errorBox.querySelector("p").innerText = "Vui lòng nhập đầy đủ thông tin.";
        errorBox.classList.remove("hidden");
        return;
    }

    try {

        const response = await fetch(
            "http://localhost/Scientific-Journal-Publication-Trend-Tracking-System/source_code/api/dangnhap.php",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            }
        );

        const result = await response.json();

        console.log(result);

        if (result.success) {

            successBox.querySelector("p").innerText = result.message;
            successBox.classList.remove("hidden");

            // Lưu thông tin người dùng (nếu cần)
         localStorage.setItem("user", JSON.stringify(result.user));

            // Chuyển sang trang chính
            setTimeout(function () {
                window.location.href = "trangchu1.html";
            }, 1000);

        } else {

            errorBox.querySelector("p").innerText = result.message;
            errorBox.classList.remove("hidden");

        }

    } catch (error) {

        console.error(error);

        errorBox.querySelector("p").innerText = "Không thể kết nối đến máy chủ.";
        errorBox.classList.remove("hidden");

    }

}
</script>
